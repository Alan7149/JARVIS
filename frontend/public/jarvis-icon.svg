<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#041628"/>
      <stop offset="100%" stop-color="#020b18"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0066aa" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Hex grid background (subtle) -->
  <g clip-path="url(#circle-clip)" opacity="0.07">
    <path d="M128 0 L192 110 L128 220 L0 220 L-64 110 L0 0 Z" fill="none" stroke="#00d4ff" stroke-width="1" transform="translate(100,80)"/>
    <path d="M128 0 L192 110 L128 220 L0 220 L-64 110 L0 0 Z" fill="none" stroke="#00d4ff" stroke-width="1" transform="translate(228,80)"/>
    <path d="M128 0 L192 110 L128 220 L0 220 L-64 110 L0 0 Z" fill="none" stroke="#00d4ff" stroke-width="1" transform="translate(356,80)"/>
    <path d="M128 0 L192 110 L128 220 L0 220 L-64 110 L0 0 Z" fill="none" stroke="#00d4ff" stroke-width="1" transform="translate(36,190)"/>
    <path d="M128 0 L192 110 L128 220 L0 220 L-64 110 L0 0 Z" fill="none" stroke="#00d4ff" stroke-width="1" transform="translate(164,190)"/>
    <path d="M128 0 L192 110 L128 220 L0 220 L-64 110 L0 0 Z" fill="none" stroke="#00d4ff" stroke-width="1" transform="translate(292,190)"/>
    <path d="M128 0 L192 110 L128 220 L0 220 L-64 110 L0 0 Z" fill="none" stroke="#00d4ff" stroke-width="1" transform="translate(100,300)"/>
    <path d="M128 0 L192 110 L128 220 L0 220 L-64 110 L0 0 Z" fill="none" stroke="#00d4ff" stroke-width="1" transform="translate(228,300)"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.1"/>

  <!-- Outer border ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#00aaff" stroke-width="3" opacity="0.6"/>

  <!-- Tick marks on outer ring -->
  <g fill="#00d4ff" opacity="0.5">
    <rect x="253" y="14" width="6" height="18" rx="2"/>
    <rect x="253" y="480" width="6" height="18" rx="2"/>
    <rect x="14" y="253" width="18" height="6" rx="2"/>
    <rect x="480" y="253" width="18" height="6" rx="2"/>
  </g>
  <g fill="#00d4ff" opacity="0.3" transform="rotate(45, 256, 256)">
    <rect x="253" y="18" width="4" height="12" rx="2"/>
    <rect x="253" y="482" width="4" height="12" rx="2"/>
    <rect x="18" y="253" width="12" height="4" rx="2"/>
    <rect x="482" y="253" width="12" height="4" rx="2"/>
  </g>

  <!-- Rotating outer arc segments -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="40 20 80 20 40 400" opacity="0.4"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#0088cc" stroke-width="1" stroke-dasharray="60 15 60 15 60 400" opacity="0.3"/>

  <!-- Mid rings -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#00aaff" stroke-width="1" opacity="0.2"/>

  <!-- Scanning arc (design element) -->
  <path d="M 256 106 A 150 150 0 0 1 406 256" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#blur-glow)"/>
  <path d="M 256 406 A 150 150 0 0 1 106 256" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Inner structural ring -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>

  <!-- Inner panel lines (Iron Man HUD style) -->
  <line x1="256" y1="136" x2="256" y2="176" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="336" x2="256" y2="376" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="136" y1="256" x2="176" y2="256" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="336" y1="256" x2="376" y2="256" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>

  <!-- Diagonal accents -->
  <line x1="176" y1="176" x2="196" y2="196" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <line x1="316" y1="176" x2="336" y2="156" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <line x1="176" y1="336" x2="156" y2="356" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <line x1="316" y1="336" x2="336" y2="356" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>

  <!-- Core glow -->
  <circle cx="256" cy="256" r="90" fill="url(#glow)" opacity="0.6"/>

  <!-- Core circle -->
  <circle cx="256" cy="256" r="80" fill="#020b18" stroke="#00d4ff" stroke-width="2.5" opacity="1"/>
  <circle cx="256" cy="256" r="76" fill="#041628" opacity="0.9"/>

  <!-- Inner core glow -->
  <circle cx="256" cy="256" r="55" fill="url(#core)" opacity="0.15"/>
  <circle cx="256" cy="256" r="40" fill="#00d4ff" opacity="0.08"/>

  <!-- J Letter — main element -->
  <text
    x="256"
    y="290"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="82"
    font-weight="900"
    fill="#00d4ff"
    filter="url(#text-glow)"
    letter-spacing="-2"
  >J</text>

  <!-- Small JARVIS text below the J -->
  <text
    x="256"
    y="318"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="13"
    font-weight="600"
    fill="#00d4ff"
    opacity="0.7"
    letter-spacing="6"
  >JARVIS</text>

  <!-- Corner brackets (Iron Man HUD) -->
  <g stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.5">
    <!-- Top-left -->
    <polyline points="110,130 110,115 125,115"/>
    <!-- Top-right -->
    <polyline points="402,130 402,115 387,115"/>
    <!-- Bottom-left -->
    <polyline points="110,382 110,397 125,397"/>
    <!-- Bottom-right -->
    <polyline points="402,382 402,397 387,397"/>
  </g>

  <!-- Small dots at cardinal points -->
  <circle cx="256" cy="56" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="256" cy="456" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="56" cy="256" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="456" cy="256" r="4" fill="#00d4ff" opacity="0.6"/>

  <!-- Final outer border -->
  <circle cx="256" cy="256" r="252" fill="none" stroke="#0a2a40" stroke-width="4"/>
</svg>
