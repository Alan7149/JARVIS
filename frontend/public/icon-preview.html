<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #020b18; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 40px; }
    .sizes { display: flex; gap: 30px; align-items: center; }
    p { color: #4a7a99; font-family: monospace; font-size: 11px; text-align: center; margin: 0; }
  </style>
</head>
<body>
  <div class="sizes">
    <div style="text-align:center">
      <img src="jarvis-icon.svg" width="256" height="256"/>
      <p style="margin-top:8px">256×256</p>
    </div>
    <div style="text-align:center">
      <img src="jarvis-icon.svg" width="128" height="128"/>
      <p style="margin-top:8px">128×128</p>
    </div>
    <div style="text-align:center">
      <img src="jarvis-icon.svg" width="64" height="64"/>
      <p style="margin-top:8px">64×64</p>
    </div>
    <div style="text-align:center">
      <img src="jarvis-icon.svg" width="32" height="32"/>
      <p style="margin-top:8px">32×32</p>
    </div>
    <div style="text-align:center">
      <img src="jarvis-icon.svg" width="16" height="16"/>
      <p style="margin-top:8px">16×16</p>
    </div>
  </div>
  <p>JARVIS — Just A Rather Very Intelligent System</p>
</body>
</html>
